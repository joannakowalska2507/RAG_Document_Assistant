<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
    <title>AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-neutral-50">

<div class="flex h-screen overflow-hidden">

 <!-- Sidebar -->
    <aside class="w-64 bg-neutral-100 text-black p-4 flex flex-col border-r border-gray-300">
        <nav class="flex flex-col gap-2">
            <a href="/" class="text-lg font-bold  p-2" >RAG Assistant</a>
            <a href="/" class="p-2 rounded hover:bg-purple-300">Zadaj pytanie </a>
            <a href="/upload" class=" p-2 rounded hover:bg-purple-300">Dodaj plik do bazy wiedzy
            </a>
            <a href="/view_docs" class="p-2 rounded hover:bg-purple-300">Baza wiedzy  </a>
            <a href="/history" class="p-2 rounded hover:bg-purple-300">Historia pytań</a>
            <a href="/description" class="p-2 rounded hover:bg-purple-300">O projekcie </a>
        </nav>

    </aside>
 <main class="flex-1 flex flex-col min-h-0 p-2">
            <h2 class="text-xl font-semibold mb-4 px-5">
             Dokumenty w bazie wiedzy
            </h2>
          <div class="h-full overflow-y-auto px-5 pb-6   ">
             <table class=" bg-white  shadow rounded-lg  overflow-hidden w-full  ">
                <thead class="bg-gray-200 sticky top-0 z-10 ">
                    <tr>
                        <th class="px-4 py-2 text-left"></th>
                        <th class="px-4 py-2 text-left">Nazwa pliku</th>
                        <th class="px-4 py-2 text-left">Data dodania</th>
                        <th class="px-4 py-2 text-center">Akcje</th>
                    </tr>
                </thead>

                <tbody>
                    {% for file in files %}
                    <tr class="border-t hover:bg-gray-100">
                         <td class="text-gray-500 text-center">
                             {{ loop.index }}.
                        </td>
                        <td class="px-4 py-2">
                            {{ file.filename }}
                        </td>

                        <td class="px-4 py-2">
                            {{ file.upload_time }}
                        </td>

                        <td class="px-4 py-2 text-center">
                            <form action="/delete/{{ file.doc_id }}" method="POST">
                                <button
                                    type="submit"
                                    class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1 rounded-md"
                                >
                                    Usuń
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
         </div>
 </main>

</div>

</body>
</html>
